<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPF Tool</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: #e2e8f0;
}

.container {
  max-width: 900px;
  margin: 50px auto;
}

h1 {
  text-align: center;
  margin-bottom: 40px;
}

.card {
  background: #020617;
  padding: 25px;
  border-radius: 12px;
  margin-bottom: 20px;
  border: 1px solid #1e293b;
}

input[type=file] {
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 15px;
  background: #6366f1;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #4f46e5;
}

#stats {
  margin-top: 15px;
  font-size: 14px;
  color: #94a3b8;
}

#search {
  width: 100%;
  padding: 10px;
  margin-top: 15px;
  border-radius: 8px;
  border: none;
}

pre {
  background: black;
  padding: 20px;
  border-radius: 10px;
  max-height: 300px;
  overflow: auto;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ SPF Extractor</h1>

<div class="card">
  <label>Domains Available</label>
  <input type="file" id="file1">
  <div id="f1name"></div>
</div>

<div class="card">
  <label>Master with include</label>
  <input type="file" id="file2">
  <div id="f2name"></div>
</div>

<button onclick="extract()">Extract Matches</button>

<div id="stats"></div>

<input type="text" id="search" placeholder="Search in results..." oninput="filterResults()">

<pre id="output"></pre>

<button onclick="download()">Download</button>

</div>

<script>
let allResults = [];

function clean(text) {
  return text
    .toLowerCase()
    .replace(/[^\x00-\x7F]/g, "")
    .trim();
}

document.getElementById("file1").onchange = e => {
  document.getElementById("f1name").textContent = e.target.files[0]?.name || "";
};

document.getElementById("file2").onchange = e => {
  document.getElementById("f2name").textContent = e.target.files[0]?.name || "";
};

async function extract() {
  const f1 = file1.files[0];
  const f2 = file2.files[0];

  if (!f1 || !f2) {
    alert("Upload both files!");
    return;
  }

  const text1 = await f1.text();
  const text2 = await f2.text();

  const domains = text1.split(/\r?\n/)
    .map(clean)
    .filter(Boolean);

  const lines = text2.split(/\r?\n/)
    .map(l => l.trim())
    .filter(Boolean);

  allResults = [];

  for (let line of lines) {
    let l = clean(line);

    for (let d of domains) {
      if (l.includes(d)) {
        allResults.push(line);
        break;
      }
    }
  }

  showResults(allResults);
}

function showResults(data) {
  document.getElementById("output").textContent =
    data.length ? data.join("\n") : "No matches found";

  document.getElementById("stats").textContent =
    `Matches: ${data.length}`;
}

function filterResults() {
  const q = clean(document.getElementById("search").value);

  const filtered = allResults.filter(line =>
    clean(line).includes(q)
  );

  showResults(filtered);
}

function download() {
  if (!allResults.length) return alert("No data");

  const blob = new Blob([allResults.join("\n")], { type: "text/plain" });
  const a = document.createElement("a");

  a.href = URL.createObjectURL(blob);
  a.download = "results.txt";
  a.click();
}
</script>

</body>
</html>
