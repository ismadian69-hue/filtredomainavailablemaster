<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SPF Extractor Turbo</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
  text-align:center;
  padding:40px;
}

.box{
  border:2px dashed #444;
  padding:30px;
  margin:15px;
  border-radius:10px;
  cursor:pointer;
}

button{
  padding:15px 30px;
  background:#6366f1;
  border:none;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

.progress{
  height:8px;
  background:#222;
  margin-top:20px;
  border-radius:10px;
}

.bar{
  height:100%;
  width:0%;
  background:#22c55e;
}

pre{
  background:black;
  padding:20px;
  margin-top:20px;
  max-height:300px;
  overflow:auto;
}
</style>
</head>

<body>

<h1>⚡ SPF Extractor TURBO</h1>

<div class="box" onclick="file1.click()">Domains File</div>
<input type="file" id="file1" hidden>

<div class="box" onclick="file2.click()">Master File</div>
<input type="file" id="file2" hidden>

<button onclick="run()">🚀 Start</button>

<div class="progress"><div class="bar" id="bar"></div></div>

<pre id="output"></pre>

<script>
let worker = new Worker("worker.js");

worker.onmessage = e => {
  if(e.data.type === "progress"){
    bar.style.width = e.data.value + "%";
  }
  if(e.data.type === "done"){
    output.textContent = e.data.result.join("\n") || "No matches";
  }
};

async function run(){
  const f1 = file1.files[0];
  const f2 = file2.files[0];

  if(!f1 || !f2){
    alert("Upload files");
    return;
  }

  const text1 = await f1.text();
  const text2 = await f2.text();

  worker.postMessage({text1, text2});
}
</script>

</body>
</html>
