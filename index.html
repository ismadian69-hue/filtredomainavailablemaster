<script>
async function readFileLines(file) {
  const text = await file.text();
  return text.split("\n").map(l => l.trim()).filter(l => l);
}

async function readDomains(file) {
  const lines = await readFileLines(file);
  return new Set(lines);
}

async function extract() {
  const f1 = document.getElementById("file1").files[0];
  const f2 = document.getElementById("file2").files[0];

  if (!f1 || !f2) {
    alert("Upload both files!");
    return;
  }

  const domains = await readDomains(f1);
  const lines = await readFileLines(f2);

  const results = [];

  for (let line of lines) {
    for (let domain of domains) {
      if (line.includes(domain)) {
        results.push(line);
        break; // باش ما يعاودش نفس ligne
      }
    }
  }

  document.getElementById("output").textContent =
    results.length ? results.join("\n") : "No matches found";
}
</script>
