<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPF Extractor</title>

<style>
  body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 40px;
  }

  .box {
    border: 2px dashed #555;
    padding: 30px;
    margin: 20px;
    border-radius: 10px;
  }

  button {
    background: #6366f1;
    border: none;
    padding: 12px 25px;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
  }

  button:hover {
    background: #4f46e5;
  }

  pre {
    text-align: left;
    background: #020617;
    padding: 20px;
    margin-top: 20px;
    border-radius: 10px;
    max-height: 300px;
    overflow: auto;
  }
</style>
</head>

<body>

<h1>SPF Extractor</h1>

<div class="box">
  <p>Domains Available</p>
  <input type="file" id="file1">
</div>

<div class="box">
  <p>Master with include</p>
  <input type="file" id="file2">
</div>

<button onclick="extract()">Extract Matches</button>

<pre id="output"></pre>

<script>
async function readFile(file) {
  const text = await file.text();
  return new Set(
    text.split("\n").map(l => l.trim()).filter(l => l)
  );
}

async function extract() {
  const f1 = document.getElementById("file1").files[0];
  const f2 = document.getElementById("file2").files[0];

  if (!f1 || !f2) {
    alert("Upload both files!");
    return;
  }

  const set1 = await readFile(f1);
  const set2 = await readFile(f2);

  const matches = [...set1].filter(x => set2.has(x));

  document.getElementById("output").textContent =
    matches.length ? matches.join("\n") : "No matches found";
}
</script>

</body>
</html>
