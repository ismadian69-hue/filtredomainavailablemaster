<script>
async function readFileLines(file) {
  const text = await file.text();
  return text.split("\n").map(l => l.trim()).filter(l => l);
}

async function extract() {
  const f1 = document.getElementById("file1").files[0];
  const f2 = document.getElementById("file2").files[0];

  if (!f1 || !f2) {
    alert("Upload both files!");
    return;
  }

  // domains available
  const domains = new Set(await readFileLines(f1));

  // master file lines
  const lines = await readFileLines(f2);

  const results = [];

  for (let line of lines) {
    // ناخدو غير domain لي قبل :
    const parts = line.split(":");
    if (parts.length < 1) continue;

    const domain = parts[0].trim();

    if (domains.has(domain)) {
      results.push(line); // نرجعو ligne كاملة
    }
  }

  document.getElementById("output").textContent =
    results.length ? results.join("\n") : "No matches found";
}
</script>
