<script>
async function extract() {
  const f1 = document.getElementById("file1").files[0];
  const f2 = document.getElementById("file2").files[0];

  if (!f1 || !f2) {
    alert("Upload both files!");
    return;
  }

  // نقرى الملفات
  const text1 = (await f1.text()).toLowerCase();
  const text2 = (await f2.text()).toLowerCase();

  // domains (file1)
  const domains = text1
    .split(/\r?\n/)
    .map(d => d.trim())
    .filter(Boolean);

  const domainSet = new Set(domains);

  // lines (file2)
  const lines = text2
    .split(/\r?\n/)
    .map(l => l.trim())
    .filter(Boolean);

  const results = [];

  for (let line of lines) {
    // ناخدو domain لي قبل ":" بأي طريقة
    let domain = line.split(":")[0].trim();

    // نحيد spaces زايدة
    domain = domain.replace(/\s+/g, "");

    if (domainSet.has(domain)) {
      results.push(line);
    }
  }

  document.getElementById("output").textContent =
    results.length ? results.join("\n") : "No matches found";
}
</script>
