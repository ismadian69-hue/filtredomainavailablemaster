<script>
async function readFileLines(file) {
  const text = await file.text();

  return text
    .replace(/\r/g, "") // نحيد CR
    .split("\n")
    .map(l => l.trim())
    .filter(l => l.length > 0);
}

async function extract() {
  const f1 = document.getElementById("file1").files[0];
  const f2 = document.getElementById("file2").files[0];

  if (!f1 || !f2) {
    alert("Upload both files!");
    return;
  }

  // domains
  const domains = new Set(
    (await readFileLines(f1)).map(d => d.toLowerCase())
  );

  const lines = await readFileLines(f2);

  const results = [];

  for (let line of lines) {
    // نقطع حتى لـ ":" الأول فقط
    const match = line.match(/^([^:]+)\s*:/);

    if (!match) continue;

    const domain = match[1].trim().toLowerCase();

    if (domains.has(domain)) {
      results.push(line);
    }
  }

  document.getElementById("output").textContent =
    results.length ? results.join("\n") : "No matches found";
}
</script>
