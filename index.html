<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPF Extractor X</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: linear-gradient(120deg, #020617, #0f172a);
  color: white;
}

.wrapper {
  max-width: 1100px;
  margin: 60px auto;
}

.title {
  text-align: center;
  font-size: 34px;
  margin-bottom: 40px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.card {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 15px;
  padding: 25px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: #6366f1;
}

.drop {
  border: 2px dashed rgba(255,255,255,0.2);
  padding: 40px;
  text-align: center;
  border-radius: 12px;
  cursor: pointer;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 20px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #6366f1, #8b5cf6);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.output {
  margin-top: 30px;
  background: black;
  padding: 20px;
  border-radius: 12px;
  max-height: 300px;
  overflow: auto;
  font-size: 13px;
}

.stats {
  margin-top: 15px;
  color: #94a3b8;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="title">🚀 SPF Extractor X</div>

<div class="grid">

  <div class="card">
    <h3>Domains Available</h3>
    <div class="drop" onclick="file1.click()">Drop or Click</div>
    <input type="file" id="file1" hidden>
    <div id="name1"></div>
  </div>

  <div class="card">
    <h3>Master with Include</h3>
    <div class="drop" onclick="file2.click()">Drop or Click</div>
    <input type="file" id="file2" hidden>
    <div id="name2"></div>
  </div>

</div>

<button onclick="extract()">⚡ Extract Now</button>

<div class="stats" id="stats"></div>

<div class="output" id="output">Waiting...</div>

</div>

<script>
let results = [];

function clean(t){
  return t.toLowerCase().replace(/[^\x00-\x7F]/g,"").trim();
}

file1.onchange = e => name1.textContent = e.target.files[0].name;
file2.onchange = e => name2.textContent = e.target.files[0].name;

async function extract(){
  const f1 = file1.files[0];
  const f2 = file2.files[0];

  if(!f1 || !f2) return alert("Upload files");

  const d1 = (await f1.text()).split(/\r?\n/).map(clean).filter(Boolean);
  const d2 = (await f2.text()).split(/\r?\n/).filter(Boolean);

  results = [];

  for(let line of d2){
    let low = clean(line);

    for(let d of d1){
      if(low.includes(d)){
        results.push(line);
        break;
      }
    }
  }

  output.textContent = results.length ? results.join("\n") : "No matches";
  stats.textContent = "Matches: " + results.length;
}
</script>

</body>
</html>
