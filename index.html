<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SPF Extractor</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:40px;
}

.box{
  border:2px dashed #555;
  padding:30px;
  margin:20px;
  border-radius:10px;
}

button{
  padding:15px 30px;
  background:#6366f1;
  border:none;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

pre{
  background:black;
  padding:20px;
  margin-top:20px;
  max-height:300px;
  overflow:auto;
}
</style>
</head>

<body>

<h1>SPF Extractor (Stable)</h1>

<div class="box">
  Domains Available<br><br>
  <input type="file" id="file1">
</div>

<div class="box">
  Master with include<br><br>
  <input type="file" id="file2">
</div>

<button onclick="extract()">Extract Matches</button>

<pre id="output"></pre>

<script>
function clean(t){
  return t.toLowerCase().trim();
}

async function extract(){
  const f1 = document.getElementById("file1").files[0];
  const f2 = document.getElementById("file2").files[0];

  if(!f1 || !f2){
    alert("Upload both files");
    return;
  }

  const text1 = await f1.text();
  const text2 = await f2.text();

  const domains = text1.split(/\r?\n/)
    .map(clean)
    .filter(Boolean);

  const lines = text2.split(/\r?\n/)
    .map(l => l.trim())
    .filter(Boolean);

  let results = new Set();

  for(let line of lines){
    let lowerLine = clean(line);

    for(let d of domains){
      if(lowerLine.includes(d)){
        let domain = line.split(":")[0].trim();
        results.add(domain);
        break;
      }
    }
  }

  const final = [...results];

  document.getElementById("output").textContent =
    final.length ? final.join("\n") : "No matches found";
}
</script>

</body>
</html>
